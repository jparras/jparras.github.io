# =============================================================================
# theses.yml — Supervised Bachelor's, Master's and PhD theses
# =============================================================================
# Fields:
#   type          : phd | master | bachelor (required)
#   student       : Student full name (required)
#   title         : Thesis title (required)
#   year          : Year of defence, integer (required)
#   url           : Permanent URL / repository link (optional)
#   co-supervised : Name of co-supervisor if applicable (optional)
#   led_to_pub     : true | false — whether the thesis led to a publication (optional)
#   note          : Short annotation (e.g. award, FPI grant, ongoing...)
# =============================================================================

