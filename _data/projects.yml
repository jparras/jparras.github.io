# =============================================================================
# projects.yml — Single source of truth for research projects
# =============================================================================
# Fields:
#   name          : Full project name (required)
#   acronym       : Short identifier shown in badges (required)
#   funding_type  : european | national | regional | private (required)
#   role          : PI | researcher (required)
#   area          : List — any of: healthcare, navigation, communications,
#                   security, data (used for filtering)
#   url           : Project website
#   doi           : DOI URL for EU projects registered in CORDIS
#   year_start    : Integer (required)
#   year_end      : Integer — omit or null if ongoing
#   active        : true | false
#   partners      : Short description of consortium / partners (optional)
#   description   : One-sentence summary for industry-facing sections (optional)
# =============================================================================

